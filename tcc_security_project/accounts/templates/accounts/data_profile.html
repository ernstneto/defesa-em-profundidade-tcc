<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Profile Data</title>
	<style>
		table {width: 100%; border-collapse: collapse; }
		th, td {border: 1px solid #ddd; padding: 8px; text-align: left; }
		th {background-color: #f2f2f2; }
	</style>
</head>
<body>
	<nav>
		<a href="{% url 'dashboard' %}">Voltar ao Dashboard</a>
	</nav>
	<hr>
	<h1>Dados coletados Sobre Sua conexão</h1>
	<p>Esta págine demostra as informações que seu navegador envia ao nosso servidor a cada requisição.</p>
	<table>
		<thead>
			<tr>
				<th>Tipos de dados</th>
				<th>Informações Coletada</th>
			</tr>
			<tbody>
				{% for key, value in profile_data %}
				<tr>
					<td><strong>{{ key }}</strong></td>
					<td>{{ value }}</td>
				</tr>
				{% endfor %}
			</tbody>
		</thead>
	</table>
</body>
</html>
