{% extends 'base.html' %}

{% block title %}Login - ForensicVault{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 50px auto;">
	<h2 style="text-align: center;">Acesso Restrito</h2>
	<p style="text-align: center; color: #666; margin-bottom: 20px;">Insira suas credenciais para acessar o cofre.</p>
	<form method="post">
		{% csrf_token %}

		{{ form.as_p }}
		<button type="submit" style="width: 100%;">Entrar no Sistema</button>
	</form>

	<div style="text-align: center; margin-top: 15px;">
		<a href="#" style="color: var(--accent-color);">Esqueceu a senha?</a>
	</div>
</div>
{% endblock %}
