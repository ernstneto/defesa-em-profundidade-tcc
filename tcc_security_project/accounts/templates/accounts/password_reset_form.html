<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Recuperar Senha</title>
</head>
<body>
	<h2>Recuperar Senha</h2>
	<p>Digite seu endereço de e-mail abaixo e enviaremos instruções para definir uma nova senha.</p>
	<form method="post">
		{% csrf_token %}
		{{ form.as_p }}
		<button type="submit">Enviar E-mail de Recuperação</button>
	</form>
	<p><a href="{% url 'accounts:login' %}">Voltar para o Login</a></p>
</body>
</html>
