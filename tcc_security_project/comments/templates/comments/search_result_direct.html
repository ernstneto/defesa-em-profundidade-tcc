<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>SEARCH RESULT DIRECT</title>
</head>
<body>
	<h1>Resultados da Busca (direta)</h1>
	<form method="get">
		<input type="text" name="q" placeholder="Buscar por autor">
		<button type="submit">Buscar</button>
	</form>
	{% for item in results %}
		<p>{{ item.author }}: {{ item.text }}
	{% empty %}
		<p>Nenhum comentário encontrado.</p>
	{% endfor %}
</body>
</html>
